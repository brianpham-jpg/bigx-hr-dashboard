<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BigX HR Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;height:100vh;background:#f8fafc;overflow:hidden;color:#1e293b;}

/* SIDEBAR */
#sidebar{width:214px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto;}
.sb-header{padding:16px;border-bottom:1px solid #f1f5f9;}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.logo-box{width:34px;height:34px;background:#5b21b6;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-box i{font-size:18px;color:#fff;}
.logo-name{font-size:13px;font-weight:600;color:#1e293b;line-height:1.2;}
.logo-sub{font-size:10px;color:#94a3b8;}
.live-badge{font-size:10px;background:#dcfce7;color:#16a34a;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;}
.live-dot{width:5px;height:5px;background:#22c55e;border-radius:50%;display:inline-block;}

nav{flex:1;padding:8px 0;}
.nav-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;border-radius:6px;margin:1px 8px;transition:background 0.1s;}
.nav-item:hover{background:#f1f5f9;color:#334155;}
.nav-item.active{background:#ede9fe;color:#5b21b6;font-weight:500;}
.nav-item i{font-size:16px;flex-shrink:0;}
.nav-sub{padding:5px 12px 5px 36px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:11px;color:#94a3b8;border-radius:6px;margin:1px 8px;}
.nav-sub:hover{background:#f8fafc;color:#64748b;}
.nav-sub i{font-size:13px;}

.sb-footer{padding:12px 14px;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.avatar{width:30px;height:30px;background:#ede9fe;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#5b21b6;flex-shrink:0;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;}
.topbar-left i{font-size:18px;color:#5b21b6;}
.live-tag{font-size:10px;background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:20px;border:1px solid #bbf7d0;font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.update-time{font-size:11px;color:#94a3b8;}
.btn-refresh{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#64748b;display:flex;align-items:center;gap:5px;}
.btn-refresh:hover{border-color:#5b21b6;color:#5b21b6;}
.btn-refresh i{font-size:14px;}

.filter-bar.hidden{display:none;}
.filter-bar{background:#fff;border-bottom:1px solid #f1f5f9;padding:7px 20px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.fb{font-size:10px;padding:4px 11px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;color:#64748b;}
.fb:hover{border-color:#5b21b6;color:#5b21b6;}
.fb.active{border-color:#5b21b6;background:#ede9fe;color:#5b21b6;font-weight:500;}
.fb-sep{color:#e2e8f0;font-size:16px;margin:0 2px;}
.fb-date{font-size:10px;padding:4px 9px;border-radius:20px;border:1px solid #e2e8f0;color:#64748b;background:#fff;}

.content{flex:1;overflow-y:auto;padding:16px 20px;}

/* STATES */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;color:#94a3b8;font-size:13px;flex-direction:column;gap:10px;}
.loading i{font-size:32px;color:#e2e8f0;}
.coming{display:flex;align-items:center;justify-content:center;height:60vh;color:#94a3b8;font-size:13px;flex-direction:column;gap:10px;}
.coming i{font-size:40px;color:#e2e8f0;}
.error-msg{display:flex;align-items:center;justify-content:center;height:60vh;color:#ef4444;font-size:13px;flex-direction:column;gap:8px;}

/* ─── SƠ ĐỒ TỔ CHỨC ─── */
.org-wrap{padding:24px 16px;overflow-x:auto;display:flex;justify-content:center;}
.org-tree,.org-tree ul{list-style:none;margin:0;padding:0;}
.org-tree{display:inline-flex;flex-direction:column;align-items:center;}
.org-tree ul{display:flex;padding-top:20px;position:relative;}
.org-tree ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid #e2e8f0;width:0;height:20px;}
.org-tree li{float:left;text-align:center;list-style-type:none;position:relative;padding:20px 6px 0 6px;}
.org-tree li::before,.org-tree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:20px;border-top:2px solid #e2e8f0;}
.org-tree li::after{right:auto;left:50%;border-left:2px solid #e2e8f0;}
.org-tree li:only-child::after,.org-tree li:only-child::before{display:none;}
.org-tree li:first-child::before,.org-tree li:last-child::after{border:0 none;}
.org-tree li:last-child::before{border-right:2px solid #e2e8f0;border-radius:0 5px 0 0;}
.org-tree li:first-child::after{border-radius:5px 0 0 0;}
.org-tn{display:inline-block;border:1.5px solid #e2e8f0;border-radius:10px;padding:9px 13px;background:#fff;text-align:center;transition:border-color 0.15s,box-shadow 0.15s;cursor:default;}
.org-tn:hover{border-color:#5b21b6;box-shadow:0 2px 8px rgba(91,33,182,0.1);}
.org-tn-badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.org-tn-name{font-size:12px;font-weight:600;color:#1e293b;white-space:nowrap;}
.org-tn-role{font-size:10px;color:#64748b;margin-top:1px;white-space:nowrap;}
.org-ceo{background:#5b21b6;border-color:#4c1d95;min-width:200px;}
.org-ceo .org-tn-badge{color:#c4b5fd;}
.org-ceo .org-tn-name{color:#fff;font-size:13px;}
.org-ceo .org-tn-role{color:#ddd6fe;}
.org-coo{background:#1d4ed8;border-color:#1e3a8a;min-width:180px;}
.org-coo .org-tn-badge{color:#93c5fd;}
.org-coo .org-tn-name{color:#fff;}
.org-coo .org-tn-role{color:#bfdbfe;}
.org-cgo{background:#16a34a;border-color:#166534;min-width:170px;}
.org-cgo .org-tn-badge{color:#86efac;}
.org-cgo .org-tn-name{color:#fff;}
.org-cgo .org-tn-role{color:#bbf7d0;}
.org-hr{background:#fff7ed;border-color:#fed7aa;}
.org-hr .org-tn-name{color:#9a3412;font-size:11px;}
.org-acc{background:#fefce8;border-color:#fde68a;}
.org-acc .org-tn-name{color:#854d0e;font-size:11px;}
.org-team .org-tn-name{font-size:11px;}
.org-sub{background:#f8fafc;border:1px dashed #cbd5e1;}
.org-sub .org-tn-name{font-size:10px;color:#64748b;font-weight:400;}

/* ─── ORG CHART V4 ─── */
.oc-page{padding:16px;height:calc(100vh - 52px);overflow:hidden;display:flex;align-items:flex-start;justify-content:center;position:relative;}
.oc-wrap{display:inline-flex;flex-direction:column;align-items:center;transform-origin:top center;}
.oc-card{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:12px;border:2px solid;}
.oc-ci{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.2);}
.oc-ci i{font-size:20px;color:#fff;}
.oc-cx-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;}
.oc-cx-name{font-size:13px;font-weight:700;white-space:nowrap;}
.oc-cx-role{font-size:10px;opacity:0.8;white-space:nowrap;}
.oc-ceo{background:#f97316;border-color:#ea580c;color:#fff;}
.oc-coo{background:#2563eb;border-color:#1d4ed8;color:#fff;}
.oc-cgo{background:#16a34a;border-color:#15803d;color:#fff;}
.oc-team{border-radius:10px;border:2px solid;padding:8px 10px;text-align:center;width:130px;}
.oc-ti{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;}
.oc-ti i{font-size:16px;color:#fff;}
.oc-tn{font-size:10px;font-weight:600;line-height:1.3;}
.oc-tr{font-size:9px;margin-top:1px;opacity:0.65;}
.oc-tts{background:#f0fdfa;border-color:#14b8a6;}.oc-tts .oc-ti{background:#14b8a6;}.oc-tts .oc-tn{color:#0f766e;}
.oc-mkt{background:#eff6ff;border-color:#3b82f6;}.oc-mkt .oc-ti{background:#3b82f6;}.oc-mkt .oc-tn{color:#1d4ed8;}
.oc-acct{background:#faf5ff;border-color:#a855f7;}.oc-acct .oc-ti{background:#a855f7;}.oc-acct .oc-tn{color:#7e22ce;}
.oc-ecom{background:#f5f3ff;border-color:#8b5cf6;}.oc-ecom .oc-ti{background:#8b5cf6;}.oc-ecom .oc-tn{color:#6d28d9;}
.oc-thr{background:#fff7ed;border-color:#fb923c;}.oc-thr .oc-ti{background:#fb923c;}.oc-thr .oc-tn{color:#c2410c;}
.oc-tacc{background:#fefce8;border-color:#eab308;}.oc-tacc .oc-ti{background:#eab308;}.oc-tacc .oc-tn{color:#a16207;}
.oc-biz{background:#f0fdf4;border-color:#22c55e;}.oc-biz .oc-ti{background:#22c55e;}.oc-biz .oc-tn{color:#15803d;}
.oc-sub{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;white-space:nowrap;}
.oc-si{width:20px;height:20px;background:#e2e8f0;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.oc-si i{font-size:11px;color:#64748b;}
.oc-sn{font-size:9px;font-weight:500;color:#475569;}
.oc-subitems{margin-top:8px;display:flex;flex-direction:column;gap:4px;position:relative;padding-left:12px;}
.oc-subitems::before{content:'';position:absolute;top:0;bottom:0;left:4px;width:2px;background:#e2e8f0;border-radius:2px;}
.oc-tree,.oc-tree ul{list-style:none;margin:0;padding:0;}
.oc-tree{display:inline-flex;flex-direction:column;align-items:center;}
.oc-tree ul{display:flex;padding-top:20px;position:relative;}
.oc-tree ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid #94a3b8;width:0;height:20px;}
.oc-tree li{float:left;text-align:center;list-style-type:none;position:relative;padding:20px 8px 0 8px;}
.oc-tree li::before,.oc-tree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:20px;border-top:2px solid #94a3b8;}
.oc-tree li::after{right:auto;left:50%;border-left:2px solid #94a3b8;}
.oc-tree li:only-child::after,.oc-tree li:only-child::before{display:none;}
.oc-tree li:first-child::before,.oc-tree li:last-child::after{border:0 none;}
.oc-tree li:last-child::before{border-right:2px solid #94a3b8;border-radius:0 5px 0 0;}
.oc-tree li:first-child::after{border-radius:5px 0 0 0;}
.oc-ul-or::before{border-left-color:#f97316 !important;}
.oc-ul-bl::before{border-left-color:#3b82f6 !important;}
.oc-ul-gr::before{border-left-color:#22c55e !important;}
.oc-li-or::before,.oc-li-or::after{border-color:#f97316 !important;}
.oc-li-or:last-child::before{border-right-color:#f97316 !important;}
.oc-li-bl::before,.oc-li-bl::after{border-color:#3b82f6 !important;}
.oc-li-bl:last-child::before{border-right-color:#3b82f6 !important;}
.oc-li-gr::before,.oc-li-gr::after{border-color:#22c55e !important;}
.oc-li-gr:last-child::before{border-right-color:#22c55e !important;}
.oc-bigx{position:absolute;bottom:16px;right:20px;font-size:18px;font-weight:800;color:#1e293b;opacity:0.5;}
.oc-bigx b{color:#f97316;}

/* ─── TUYỂN DỤNG REDESIGN ─── */
.td-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.td-kpi{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;}
.td-kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.td-kpi-lbl{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;}
.td-kpi-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.td-kpi-icon i{font-size:16px;}
.td-kpi-val{font-size:26px;font-weight:600;line-height:1;margin-bottom:6px;color:#1e293b;}
.td-kpi-footer{display:flex;align-items:center;justify-content:space-between;}
.td-kpi-prev{font-size:10px;color:#475569;}
.badge-up{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:500;color:#0F6E56;background:#E1F5EE;padding:2px 7px;border-radius:20px;}
.badge-down{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:500;color:#993C1D;background:#FAECE7;padding:2px 7px;border-radius:20px;}
.badge-neutral{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:500;color:#475569;background:#e2e8f0;padding:2px 7px;border-radius:20px;}
.badge-up i,.badge-down i,.badge-neutral i{font-size:11px;}

.td-row-charts{display:grid;grid-template-columns:1.3fr 1fr;gap:10px;margin-bottom:10px;}
.td-row-bottom{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;}

.td-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;}
.td-card-title{font-size:11px;font-weight:600;color:#334155;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.td-card-title i{font-size:14px;color:#5b21b6;}
.td-card-title-right{font-size:10px;color:#94a3b8;}

.td-chart-wrap{position:relative;width:100%;height:190px;}
.td-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.td-leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#475569;}
.td-leg-sq{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;}

/* Pipeline bars */
.td-bar-row{margin-bottom:8px;}
.td-bar-lbl{display:flex;justify-content:space-between;margin-bottom:3px;}
.td-bar-lbl span:first-child{font-size:10px;color:#334155;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-bar-lbl span:last-child{font-size:10px;color:#94a3b8;}
.td-bar-track{height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden;position:relative;}
.td-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;}

/* Tables */
.td-table{width:100%;border-collapse:collapse;}
.td-table th{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.4px;padding:0 8px 8px 0;text-align:left;border-bottom:1px solid #f1f5f9;white-space:nowrap;}
.td-table td{font-size:11px;color:#334155;padding:7px 8px 7px 0;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.td-table tr:last-child td{border-bottom:none;}
.td-table tr:hover td{background:#fafafa;}
.tag-open{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:500;color:#0F6E56;background:#E1F5EE;padding:2px 8px;border-radius:20px;}
.tag-open::before{content:'';width:4px;height:4px;border-radius:50%;background:#0F6E56;display:inline-block;}
.tag-closed{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:500;color:#64748b;background:#f1f5f9;padding:2px 8px;border-radius:20px;}
.tag-closed::before{content:'';width:4px;height:4px;border-radius:50%;background:#94a3b8;display:inline-block;}
.tag-hire{display:inline-block;font-size:9px;font-weight:500;color:#0F6E56;background:#E1F5EE;padding:2px 9px;border-radius:20px;}
.qty-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:10px;font-weight:600;background:#ede9fe;color:#5b21b6;}
.td-av{width:24px;height:24px;border-radius:6px;background:#ede9fe;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#5b21b6;margin-right:7px;vertical-align:middle;flex-shrink:0;}
.td-count-badge{font-size:10px;background:#ede9fe;color:#5b21b6;padding:2px 9px;border-radius:20px;}
.td-muted{color:#475569;}

/* ─── CÔNG VIỆC NHÂN SỰ ─── */
.cv-layout{display:grid;grid-template-columns:222px 1fr;gap:12px;align-items:start;}
.cv-left{display:flex;flex-direction:column;gap:10px;}
.cv-right{display:flex;flex-direction:column;gap:10px;}

/* Calendar */
.cv-cal{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;user-select:none;}
.cv-cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;border-bottom:1px solid #f1f5f9;}
.cv-cal-title{font-size:13px;font-weight:600;color:#1e293b;}
.cv-cal-nav{display:flex;gap:2px;}
.cv-cal-nav button{background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px 6px;border-radius:6px;font-size:13px;line-height:1;}
.cv-cal-nav button:hover{background:#f1f5f9;color:#334155;}
.cv-cal-grid{padding:8px 10px 10px;}
.cv-cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.cv-cal-dow span{text-align:center;font-size:10px;font-weight:500;color:#94a3b8;padding:3px 0;}
.cv-cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.cv-day{text-align:center;font-size:11.5px;padding:4px 2px;border-radius:6px;cursor:pointer;color:#334155;position:relative;}
.cv-day:hover{background:#f1f5f9;}
.cv-day.other{color:#cbd5e1;}
.cv-day.today{background:#5b21b6;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:11px;}
.cv-day.has-task::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#5b21b6;}
.cv-day.today.has-task::after{background:#fff;}
.cv-cal-leg{padding:7px 14px 9px;border-top:1px solid #f1f5f9;display:flex;flex-direction:column;gap:4px;}
.cv-cal-leg-row{display:flex;align-items:center;gap:6px;font-size:10px;color:#64748b;}
.cv-ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* Range selection */
.cv-day.range-s,.cv-day.range-e{background:#5b21b6!important;color:#fff!important;border-radius:50%;}
.cv-day.in-range{background:#ede9fe;border-radius:0;color:#3730a3;}
.cv-day.range-s.in-range{border-radius:50% 0 0 50%;}
.cv-day.range-e.in-range{border-radius:0 50% 50% 0;}
.cv-day.today.range-s,.cv-day.today.range-e{background:#5b21b6!important;}
.cv-range-bar{padding:8px 14px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;min-height:34px;}
.cv-range-txt{font-size:11px;color:#334155;display:flex;align-items:center;gap:5px;}
.cv-range-txt i{font-size:13px;color:#5b21b6;}
.cv-range-hint{font-size:10px;color:#94a3b8;}
.cv-range-clear{font-size:10px;color:#94a3b8;cursor:pointer;padding:2px 7px;border-radius:5px;border:1px solid #e2e8f0;}
.cv-range-clear:hover{color:#5b21b6;border-color:#5b21b6;}

/* Mini year chart */
.cv-mini-chart{display:flex;flex-direction:column;gap:6px;}
.cv-mc-row{display:flex;align-items:center;gap:7px;}
.cv-mc-label{font-size:10px;color:#94a3b8;width:18px;text-align:right;flex-shrink:0;}
.cv-mc-track{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;}
.cv-mc-fill{height:100%;border-radius:3px;background:#c4b5fd;transition:width .3s;}
.cv-mc-fill.cur{background:#5b21b6;}
.cv-mc-count{font-size:10px;width:16px;text-align:right;flex-shrink:0;color:#64748b;}
.cv-mc-count.cur{color:#5b21b6;font-weight:600;}

/* Chart card */

<script>
const API = 'https://script.google.com/a/macros/bigx.vn/s/AKfycbxtgC9Cwclhb8z5_e3QzLGnLTbXNlA8IMys1df_Bzg5oVRVMMzPGOHArgjOkvTDSwPj/exec?action=data';
let rawData = null, filter = 'month', dfrom = null, dto = null;
let chartTrend = null, chartPipeline = null;

/* ─── DATE HELPERS ─── */
function parseDate(s){
  if(!s) return null;
  const p = String(s).split('/');
  if(p.length!==3) return null;
  const d = new Date(+p[2], +p[1]-1, +p[0]);
  return isNaN(d) ? null : d;
}
function fmtDate(s){ return s ? String(s) : '—'; }
function weekOf(d){
  const day=d.getDay()||7;
  const mon=new Date(d); mon.setDate(d.getDate()-day+1); mon.setHours(0,0,0,0);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return [mon,sun];
}
function getRange(f){
  const now=new Date();
  if(f==='week') return weekOf(now);
  if(f==='last-week'){ const lw=new Date(now); lw.setDate(now.getDate()-7); return weekOf(lw); }
  if(f==='month') return [new Date(now.getFullYear(),now.getMonth(),1), new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59)];
  if(f==='last-month') return [new Date(now.getFullYear(),now.getMonth()-1,1), new Date(now.getFullYear(),now.getMonth(),0,23,59,59)];
  if(f==='year') return [new Date(now.getFullYear(),0,1), new Date(now.getFullYear(),11,31,23,59,59)];
  return null;
}
function getPrevRange(f){
  const now=new Date();
  if(f==='week'){ const pw=new Date(now); pw.setDate(now.getDate()-7); return weekOf(pw); }
  if(f==='last-week'){ const pw=new Date(now); pw.setDate(now.getDate()-14); return weekOf(pw); }
  if(f==='month') return [new Date(now.getFullYear(),now.getMonth()-1,1), new Date(now.getFullYear(),now.getMonth(),0,23,59,59)];
  if(f==='last-month') return [new Date(now.getFullYear(),now.getMonth()-2,1), new Date(now.getFullYear(),now.getMonth()-1,0,23,59,59)];
  if(f==='year') return [new Date(now.getFullYear()-1,0,1), new Date(now.getFullYear()-1,11,31,23,59,59)];
  return null;
}

/* ─── FILTER LOGIC ─── */
function filterCVs(cvs, range){
  if(!range) return cvs;
  const [a,b]=range;
  return cvs.filter(c=>{ const d=parseDate(c['NGAY']); return d&&d>=a&&d<=b; });
}
function applyFilter(cvs){ return filterCVs(cvs, filter==='custom'?[dfrom,dto]:getRange(filter)); }
function applyPrevFilter(cvs){ return filterCVs(cvs, getPrevRange(filter)); }

function setFilter(f){
  filter=f; dfrom=dto=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  const map={'week':0,'last-week':1,'month':2,'last-month':3,'year':4,'all':5};
  document.querySelectorAll('.fb')[map[f]]?.classList.add('active');
  if(rawData) render();
}
function applyRange(){
  const a=document.getElementById('df').value, b=document.getElementById('dt').value;
  if(!a||!b) return;
  filter='custom'; dfrom=new Date(a); dto=new Date(b); dto.setHours(23,59,59,999);
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  if(rawData) render();
}

/* ─── BADGE HELPERS ─── */
function badge(curr, prev){
  if(!prev && prev!==0) return '<span class="badge-neutral"><i class="ti ti-minus"></i>—</span>';
  if(prev===0) return '<span class="badge-neutral"><i class="ti ti-minus"></i>—</span>';
  const pct=((curr-prev)/prev*100);
  const sign=pct>0?'+':'';
  if(Math.abs(pct)<0.05) return `<span class="badge-neutral"><i class="ti ti-minus"></i>Không đổi</span>`;
  return pct>0
    ? `<span class="badge-up"><i class="ti ti-trending-up"></i>${sign}${pct.toFixed(1)}%</span>`
    : `<span class="badge-down"><i class="ti ti-trending-down"></i>${pct.toFixed(1)}%</span>`;
}
function badgePt(curr, prev){
  if(!prev && prev!==0) return '<span class="badge-neutral"><i class="ti ti-minus"></i>—</span>';
  const diff=curr-prev;
  const sign=diff>0?'+':'';
  if(Math.abs(diff)<0.05) return `<span class="badge-neutral"><i class="ti ti-minus"></i>Không đổi</span>`;
  return diff>0
    ? `<span class="badge-up"><i class="ti ti-trending-up"></i>${sign}${diff.toFixed(1)}pt</span>`
    : `<span class="badge-down"><i class="ti ti-trending-down"></i>${diff.toFixed(1)}pt</span>`;
}
function getField(obj,...keys){
  for(const k of keys){ if(obj[k]!==undefined&&obj[k]!==null&&String(obj[k]).trim()!=='') return String(obj[k]).trim(); }
  return null;
}
function getFieldLike(obj,...patterns){
  const allKeys=Object.keys(obj);
  for(const p of patterns){
    const found=allKeys.find(k=>k.toUpperCase().replace(/\s/g,'').includes(p.toUpperCase().replace(/\s/g,'')));
    if(found&&obj[found]!==undefined&&obj[found]!==null&&String(obj[found]).trim()!=='') return String(obj[found]).trim();
  }
  return null;
}
function initials(name){
  if(!name) return '?';
  const parts=name.trim().split(' ');
  if(parts.length===1) return parts[0][0].toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}

/* ─── FETCH ─── */
const CACHE_KEY='bigx_hr_v2';
async function loadData(){
  /* Hiện cache ngay nếu có */
  const cached=localStorage.getItem(CACHE_KEY);
  if(cached){
    try{
      rawData=JSON.parse(cached);
      if(document.getElementById('nav-td').classList.contains('active')) render();
      document.getElementById('uptime').textContent='Đang làm mới...';
    }catch(_){}
  } else {
    document.getElementById('content').innerHTML='<div class="loading"><i class="ti ti-loader"></i>Đang tải dữ liệu...</div>';
    document.getElementById('uptime').textContent='Đang tải...';
  }
  /* Fetch mới ngầm */
  try{
    const r=await fetch(API);
    rawData=await r.json();
    localStorage.setItem(CACHE_KEY,JSON.stringify(rawData));
    document.getElementById('uptime').textContent='Cập nhật: '+new Date().toLocaleTimeString('vi-VN');
    if(document.getElementById('nav-td').classList.contains('active')) render();
    /* Nếu đang ở tab Công việc thì fetch task data riêng */
    if(document.getElementById('nav-cv').classList.contains('active')){

    }
  }catch(e){

      document.getElementById('content').innerHTML=`<div class="error-msg"><i class="ti ti-wifi-off"></i>Lỗi kết nối API<br><small style="color:#94a3b8">${e.message}</small></div>`;

    document.getElementById('uptime').textContent=cached?'Offline — dùng cache':'Lỗi';
  }
}

function hsPD(s){ if(!s) return null; const p=String(s).trim().split('/'); if(p.length<3) return null; const d=new Date(+p[2],+p[1]-1,+p[0]); return isNaN(d)?null:d; }
function hsAge(s){ const d=hsPD(s); if(!d) return null; const n=new Date(); let a=n.getFullYear()-d.getFullYear(); if(n.getMonth()<d.getMonth()||(n.getMonth()===d.getMonth()&&n.getDate()<d.getDate())) a--; return a; }
function hsActive(e){ return !/ngh/i.test(e.tt||''); }
function hsTenM(vao,nghi){ const a=hsPD(vao); if(!a) return null; const b=nghi?hsPD(nghi):new Date(); if(!b) return null; return (b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth()); }
function hsTenText(m){ if(m==null) return '—'; const y=Math.floor(m/12), mo=m%12; return (y?y+' năm ':'')+(mo?mo+' tháng':(y?'':'0 tháng')); }
function hsDC(pb){ const m={'KINH DOANH':['#e6f1fb','#185fa5'],'SALE':['#e6f1fb','#185fa5'],'MARKETING':['#ede9fe','#5b21b6'],'KẾ TOÁN':['#faeeda','#854f0b'],'NHÂN SỰ':['#e1f5ee','#0f6e56'],'ACCOUNT':['#faece7','#993c1d'],'BOOKING':['#fbeaf0','#993556'],'CREATIVE':['#eaf3de','#3b6d11'],'ECOM':['#e6f1fb','#0c447c']}; return m[String(pb||'').toUpperCase()]||['#f1f5f9','#475569']; }
function hsInit(t){ const w=String(t||'').trim().split(/\s+/); return (((w[w.length-2]||w[0]||'?')[0]||'')+((w[w.length-1]||'')[0]||'')).toUpperCase(); }
function hsImg(e,px){ const c=hsDC(e.pb); if(e.anh) return '<img src="'+e.anh+'" style="width:'+px+'px;height:'+px+'px;border-radius:50%;object-fit:cover;flex:none;">'; return '<span style="width:'+px+'px;height:'+px+'px;border-radius:50%;background:'+c[0]+';color:'+c[1]+';display:flex;align-items:center;justify-content:center;font-weight:600;font-size:'+Math.round(px*0.36)+'px;flex:none;">'+hsInit(e.ten)+'</span>'; }

function hsTrend(){
  const now=new Date(), cols=[];
  for(let k=5;k>=0;k--){ const dt=new Date(now.getFullYear(),now.getMonth()-k,1); cols.push({y:dt.getFullYear(),m:dt.getMonth()}); }
  const inM=(s,c)=>{ const d=hsPD(s); return d&&d.getFullYear()===c.y&&d.getMonth()===c.m; };
  const mn=['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
  const data=cols.map(c=>{ const hires=HS_DATA.filter(e=>inM(e.vao,c)).length; const leaves=HS_DATA.filter(e=>inM(e.nghi,c)).length; const end=new Date(c.y,c.m+1,0,23,59,59); const hc=HS_DATA.filter(e=>{ const v=hsPD(e.vao); if(!v||v>end) return false; const n=e.nghi?hsPD(e.nghi):null; return !n||n>end; }).length; return {c,hires,leaves,hc}; });
  const mx=Math.max(1,...data.map(d=>Math.max(d.hires,d.leaves)));
  return data.map(d=>'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="font-size:10px;color:#5b21b6;font-weight:600;">'+d.hc+'</div><div style="display:flex;gap:3px;align-items:flex-end;height:80px;"><div style="width:12px;height:'+Math.round(d.hires/mx*76)+'px;min-height:2px;background:#1d9e75;border-radius:3px;"></div><div style="width:12px;height:'+Math.round(d.leaves/mx*76)+'px;min-height:2px;background:#d85a30;border-radius:3px;"></div></div><div style="font-size:11px;color:#94a3b8;">'+mn[d.c.m]+'</div></div>').join('');
}
function hsAttrition(){
  const g={}; HS_DATA.forEach(e=>{ const k=e.pb||'Khác'; if(!g[k])g[k]={t:0,l:0}; g[k].t++; if(!hsActive(e))g[k].l++; });
  let arr=Object.entries(g).map(([k,v])=>({k,pct:v.t?Math.round(v.l/v.t*100):0,l:v.l})).filter(o=>o.l>0).sort((a,b)=>b.pct-a.pct).slice(0,5);
  if(!arr.length) return '<div style="font-size:12px;color:#94a3b8;">Chưa có nghỉ việc.</div>';
  const top=arr[0];
  let html=arr.map((o,i)=>'<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:7px;"><span style="width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+o.k+'</span><div style="flex:1;height:8px;background:#faece7;border-radius:20px;"><div style="width:'+o.pct+'%;height:8px;background:'+(i===0?'#d85a30':'#f0997b')+';border-radius:20px;"></div></div><span style="width:36px;text-align:right;'+(i===0?'color:#993c1d;font-weight:600;':'')+'">'+o.pct+'%</span></div>').join('');
  html+='<div style="font-size:11px;color:#993c1d;margin-top:8px;"><i class="ti ti-alert-triangle"></i> Cao nhất: '+top.k+' ('+top.pct+'%) · mẫu nhỏ, tham khảo</div>';
  return html;
}

function hsFillRows(){
  const el=document.getElementById('hs-rows'); if(!el) return;
  let list=HS_DATA.map((e,i)=>({e,i}));
  if(hsDept!=='all') list=list.filter(o=>o.e.pb===hsDept);
  if(hsStatus==='active') list=list.filter(o=>hsActive(o.e));
  if(hsStatus==='left') list=list.filter(o=>!hsActive(o.e));

  const rows=list.map(o=>{ const e=o.e, st=hsActive(e); return '<div style="display:flex;align-items:center;font-size:12.5px;padding:10px 8px;border-bottom:0.5px solid #f5f7fa;">'

    +'<span style="flex:1.2;">'+e.pb+'</span>'
    +'<span style="flex:1;">'+hsTenText(hsTenM(e.vao,e.nghi))+'</span>'
    +'<span style="flex:1;">'+(st?'<span style="font-size:10px;font-weight:500;color:#0f6e56;background:#e1f5ee;padding:2px 8px;border-radius:20px;">Đang làm</span>':'<span style="font-size:10px;font-weight:500;color:#993c1d;background:#faece7;padding:2px 8px;border-radius:20px;">Nghỉ việc</span>')+'</span>'
    +'<span style="width:96px;text-align:right;"><span onclick="hsOpen('+o.i+')" style="font-size:11.5px;font-weight:500;color:#5b21b6;border:0.5px solid #c4b5fd;border-radius:8px;padding:5px 10px;cursor:pointer;">Xem hồ sơ</span></span></div>'; }).join('');

function parseGViz(text){
  try{
    const json = text.replace(/^[^(]*\(/, '').replace(/\);\s*$/, '');
    return JSON.parse(json);
  }catch(e){ return null; }
}
function gvizRows(data){
  if(!data||!data.table) return [];
  const cols = data.table.cols.map(c=>c.label||'');
  return (data.table.rows||[]).map(r=>{
    const obj={};
    (r.c||[]).forEach((cell,i)=>{ obj[cols[i]] = cell&&cell.v!==null&&cell.v!==undefined ? String(cell.v).trim() : ''; });
    return obj;
  });
}
function parseTaskDate(s){
  if(!s) return null;
  const p=String(s).trim().split('/');
  if(p.length!==3) return null;
  const d=new Date(+p[2],+p[1]-1,+p[0]);
  return isNaN(d)?null:d;
}
function fmtTaskDate(s){
  const d=parseTaskDate(s); if(!d) return s||'—';
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function dlClass(s){
  const d=parseTaskDate(s); if(!d) return 'cv-dl-norm';
  const now=new Date(); now.setHours(0,0,0,0);
  const pct=parseInt(s&&s.replace('%',''))||0;
  if(pct===100) return 'cv-dl-done';
  if(d<now) return 'cv-dl-over';
  return 'cv-dl-norm';
}
function mangBadge(m){
  if(!m) return '';
  m=m.trim();
  if(m==='Tuyển dụng') return `<span class="cv-badge cv-b-tuyen">Tuyển dụng</span>`;
  if(m==='C&B') return `<span class="cv-badge cv-b-cb">C&amp;B</span>`;
  if(m==='Văn hóa nội bộ') return `<span class="cv-badge cv-b-vh">Văn hóa</span>`;
  if(m==='Đào tạo') return `<span class="cv-badge cv-b-dt">Đào tạo</span>`;
  return `<span class="cv-badge cv-b-thap">${m}</span>`;
}
function uuBadge(u){
  if(!u) return '';
  if(u==='Cao') return `<span class="cv-badge cv-b-cao">Cao</span>`;
  if(u==='Trung bình') return `<span class="cv-badge cv-b-tb">Trung bình</span>`;
  return `<span class="cv-badge cv-b-thap">Thấp</span>`;
}
function progColor(p){
  const n=parseInt(p)||0;
  if(n===100) return '#22c55e';
  if(n>=50) return '#f97316';
  return '#e2e8f0';
}

const TASK_API='https://script.google.com/macros/s/AKfycbxp_DCrToKsLfUa3rWMJhXi1-zjbSXs5hWRa0hSfy3OW90Vyb6UvuSv5ROKFPSPX9pR2Q/exec';
const TASK_CACHE_KEY='bigx_task_v1';
function cvIsActive(){ return document.getElementById('nav-cv').classList.contains('active'); }
function applyTaskData(d){
  rawTaskLH=(d&&d.taskLH&&d.taskLH.length>0)?d.taskLH:DEFAULT_LH;
  rawTaskCD=(d&&d.taskCD&&d.taskCD.length>0)?d.taskCD:DEFAULT_CD;
}
async function loadTaskData(force){
  /* 1) Hiện ngay dữ liệu có sẵn — không chờ mạng */
  if(taskDataLoaded && !force){
    renderCongViec();                       // đã có trong bộ nhớ → render tức thì
  } else {
    const cached=localStorage.getItem(TASK_CACHE_KEY);
    if(cached){
      try{ applyTaskData(JSON.parse(cached)); }catch(_){ applyTaskData(null); }
    } else {
      applyTaskData(null);                  // dùng DEFAULT để màn hình không trống
    }
    taskDataLoaded=true;
    renderCongViec();
  }
  /* 2) Fetch mới ngầm rồi cập nhật lại (chỉ render nếu vẫn đang ở tab) */
  try{
    const r=await fetch(TASK_API);
    const d=await r.json();
    applyTaskData(d);
    localStorage.setItem(TASK_CACHE_KEY,JSON.stringify({taskLH:rawTaskLH,taskCD:rawTaskCD}));
    taskDataLoaded=true;
    if(cvIsActive()) renderCongViec();
  }catch(e){
    /* giữ nguyên dữ liệu đang hiển thị nếu fetch lỗi */
  }
}
// tự cập nhật ngầm mỗi 5 phút, chỉ khi đang xem tab Công việc
setInterval(()=>{ if(cvIsActive()) loadTaskData(true); }, 5*60*1000);

function cvSetMonth(y,m){
  cvYear=y; cvMonth=m; cvRangeStart=null; cvRangeEnd=null;
  renderCongViec();
}

function renderCongViec(){
  const today=new Date();
  const curY=new Date().getFullYear();

  /* ── Tasks in selected month ── */
  const monthTasks=rawTaskLH.filter(t=>{
    const d=parseTaskDate(t['Deadline']||t['deadline']||t['DEADLINE']);
    return d&&d.getFullYear()===cvYear&&d.getMonth()===cvMonth;
  });
  const totalCD=rawTaskCD.filter(t=>t['Nội dung chi tiết']).length;
  const totalM=monthTasks.length+totalCD;
  const doneM=monthTasks.filter(t=>(parseInt(t['Tiến độ (%)'||t['Tiến độ']||t['TIEN DO']])||0)===100||(t['Tiến độ (%)'||'']||'').trim()==='100%').length;

  /* better pct parse */
  function getPct(t){
    const raw=t['Tiến độ (%)']; if(raw===undefined||raw===null||raw==='') return 0;
    const n=parseFloat(String(raw).replace('%',''));
    if(isNaN(n)) return 0;
    /* Google Sheets % format lưu dạng decimal: 100% → 1, 50% → 0.5 */
    if(n>=0 && n<=1) return Math.round(n*100);
    return Math.round(n);
  }
  const doneM2=monthTasks.filter(t=>getPct(t)===100).length;
  const overdueM=monthTasks.filter(t=>{
    const d=parseTaskDate(t['Deadline']); if(!d) return false;
    const n=new Date(); n.setHours(0,0,0,0);
    return d<n && getPct(t)<100;
  }).length;

  /* ── Calendar task dates ── */
  const taskDates=new Set();
  rawTaskLH.forEach(t=>{
    const d=parseTaskDate(t['Deadline']);
    if(d&&d.getFullYear()===cvYear&&d.getMonth()===cvMonth) taskDates.add(d.getDate());
  });

  /* ── Year chart data ── */
  const yearCounts=Array(12).fill(0);
  rawTaskLH.forEach(t=>{
    const d=parseTaskDate(t['Deadline']);
    if(d&&d.getFullYear()===cvYear) yearCounts[d.getMonth()]++;
  });

  /* ── Filtered table rows ── */
  const basePool=cvRangeStart&&cvRangeEnd?rawTaskLH.filter(t=>{
    const d=parseTaskDate(t['Deadline']); if(!d) return false;
    const dn=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    const rs=new Date(cvRangeStart.getFullYear(),cvRangeStart.getMonth(),cvRangeStart.getDate());
    const re=new Date(cvRangeEnd.getFullYear(),cvRangeEnd.getMonth(),cvRangeEnd.getDate());
    return dn>=rs&&dn<=re;
  }):monthTasks;
  let filtered=basePool.filter(t=>{
    if(cvFilterMang!=='all'&&t['Mảng']!==cvFilterMang) return false;
    if(cvFilterUu!=='all'&&t['Ưu tiên']!==cvFilterUu) return false;
    return true;
  });

  /* ── Calendar HTML ── */
  const firstDay=new Date(cvYear,cvMonth,1).getDay();
  const daysInMonth=new Date(cvYear,cvMonth+1,0).getDate();
  const prevDays=new Date(cvYear,cvMonth,0).getDate();
  const monthNames=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const prevM=cvMonth===0?11:cvMonth-1;
  const prevY=cvMonth===0?cvYear-1:cvYear;
  const nextM=cvMonth===11?0:cvMonth+1;
  const nextY=cvMonth===11?cvYear+1:cvYear;

  /* range helpers */
  function dayTs(y,m,d){ return new Date(y,m,d).getTime(); }
  const rsTs=cvRangeStart?dayTs(cvRangeStart.getFullYear(),cvRangeStart.getMonth(),cvRangeStart.getDate()):null;
  const reTs=cvRangeEnd?dayTs(cvRangeEnd.getFullYear(),cvRangeEnd.getMonth(),cvRangeEnd.getDate()):null;

  let daysCells='';
  for(let i=0;i<firstDay;i++){
    daysCells+=`<span class="cv-day other">${prevDays-firstDay+1+i}</span>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate()&&cvMonth===today.getMonth()&&cvYear===today.getFullYear();
    const hasTsk=taskDates.has(d);
    const dTs=dayTs(cvYear,cvMonth,d);
    const isRS=rsTs&&dTs===rsTs;
    const isRE=reTs&&dTs===reTs;
    const inRange=rsTs&&reTs&&dTs>rsTs&&dTs<reTs;
    const cls=['cv-day',isToday?'today':'',hasTsk?'has-task':'',isRS?'range-s':'',isRE?'range-e':'',inRange?'in-range':''].filter(Boolean).join(' ');
    daysCells+=`<span class="${cls}" onclick="cvDayClick(${cvYear},${cvMonth},${d})">${d}</span>`;
  }
  const remain=42-firstDay-daysInMonth;
  for(let d=1;d<=remain;d++) daysCells+=`<span class="cv-day other">${d}</span>`;

  /* ── Table rows HTML ── */
  const taskRows=filtered.length===0
    ? `<tr><td colspan="5" style="text-align:center;padding:16px;color:#94a3b8;font-size:12px;">Không có task trong tháng này</td></tr>`
    : filtered.map(t=>{
        const pct=getPct(t);
        const dl=t['Deadline']||'';
        const d=parseTaskDate(dl);
        const now2=new Date(); now2.setHours(0,0,0,0);
        const isOver=d&&d<now2&&pct<100;
        const dlHtml=pct===100
          ? `<span class="cv-dl-done">✓ ${fmtTaskDate(dl)}</span>`
          : isOver
            ? `<span class="cv-dl-over">! ${fmtTaskDate(dl)}</span>`
            : `<span class="cv-dl-norm">${fmtTaskDate(dl)}</span>`;
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:7px;">
            ${pct===100?'<div class="cv-check"><i class="ti ti-check"></i></div>':'<div class="cv-check" style="border-color:#e2e8f0;background:none;"></div>'}
            <span style="font-size:12px;">${t['Nội dung chi tiết']||'—'}</span>
          </div></td>
          <td>${mangBadge(t['Mảng'])}</td>
          <td>${uuBadge(t['Ưu tiên'])}</td>
          <td>${dlHtml}</td>
          <td><div class="cv-prog-wrap">
            <div class="cv-prog-bar"><div class="cv-prog-fill" style="width:${pct}%;background:${progColor(pct)};"></div></div>
            <span class="cv-prog-pct">${pct}%</span>
          </div></td>
        </tr>`;
      }).join('');

  /* ── Fixed rows ── */
  const fixedIcons={'Công đoàn':'ti-flag','Hỗ trợ OBD (Onboarding)':'ti-user-plus','Chấm công':'ti-clock','Quản lý file theo dõi nhân sự':'ti-folder','Theo dõi báo tăng giảm nhân sự tòa nhà + check chi tiết lên VP với tòa nhà':'ti-building','Teambuilding, YEP, sinh nhật,...':'ti-confetti'};
  const fixedRows=rawTaskCD.length===0
    ? `<div class="cv-fixed-row"><span style="color:#94a3b8;font-size:12px;padding:4px 0;">Không có dữ liệu</span></div>`
    : rawTaskCD.map(t=>{
        const name=t['Nội dung chi tiết']||'';
        if(!name) return '';
        const icon=Object.entries(fixedIcons).find(([k])=>name.includes(k.split(' ')[0]))?.[1]||'ti-repeat';
        return `<div class="cv-fixed-row"><i class="ti ${icon} fi"></i><span>${name}</span><span class="cv-always">Hằng tháng</span></div>`;
      }).join('');

  /* ── KPI tags ── */
  const doneTag=doneM2===totalM&&totalM>0?'cv-tag-g':doneM2>0?'cv-tag-a':'cv-tag-n';
  const overTag=overdueM>0?'cv-tag-r':'cv-tag-g';

  /* ── RENDER ── */
  document.getElementById('content').innerHTML=`
  <div class="cv-layout">
    <div class="cv-left">
      <!-- Calendar -->
      <div class="cv-cal">
        <div class="cv-cal-hdr">
          <span class="cv-cal-title">${monthNames[cvMonth]}, ${cvYear}</span>
          <div class="cv-cal-nav">
            <button onclick="cvSetMonth(${prevM===11?prevY:cvYear},${prevM})" title="Tháng trước">▲</button>
            <button onclick="cvSetMonth(${nextM===0?nextY:cvYear},${nextM})" title="Tháng sau">▼</button>
          </div>
        </div>
        <div class="cv-cal-grid">
          <div class="cv-cal-dow"><span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span></div>
          <div class="cv-cal-days">${daysCells}</div>
        </div>
        <div class="cv-cal-leg">
          <div class="cv-cal-leg-row"><span class="cv-ldot" style="background:#5b21b6;"></span>Có deadline task</div>
          <div class="cv-cal-leg-row"><span class="cv-ldot" style="background:#5b21b6;opacity:.4;"></span>Click chọn khoảng thời gian</div>
        </div>
        <div class="cv-range-bar">
          ${cvRangeStart&&cvRangeEnd
            ? `<span class="cv-range-txt"><i class="ti ti-calendar-event"></i>${cvRangeStart.getDate()}/${cvRangeStart.getMonth()+1} → ${cvRangeEnd.getDate()}/${cvRangeEnd.getMonth()+1}</span>
               <span class="cv-range-clear" onclick="cvClearRange()">Xoá</span>`
            : cvRangeStart
              ? `<span class="cv-range-hint">Chọn ngày kết thúc...</span>`
              : `<span class="cv-range-hint">Click ngày để chọn khoảng</span>`
          }
        </div>
      </div>
      <!-- Year chart mini -->
      <div class="cv-chart-card">
        <div class="cv-chart-title"><i class="ti ti-chart-bar-popular"></i>Khối lượng năm ${cvYear}</div>
        <div class="cv-mini-chart">
          ${(()=>{
            const maxC=Math.max(...yearCounts,1);
            return yearCounts.map((c,i)=>{
              if(c===0) return `<div class="cv-mc-row"><span class="cv-mc-label">T${i+1}</span><div class="cv-mc-track"><div class="cv-mc-fill" style="width:2%"></div></div><span class="cv-mc-count" style="color:#e2e8f0">0</span></div>`;
              const isCur=i===cvMonth;
              return `<div class="cv-mc-row">
                <span class="cv-mc-label" style="${isCur?'color:#5b21b6;font-weight:600;':''}"">T${i+1}</span>
                <div class="cv-mc-track"><div class="cv-mc-fill${isCur?' cur':''}" style="width:${Math.round(c/maxC*100)}%"></div></div>
                <span class="cv-mc-count${isCur?' cur':''}">${c}</span>
              </div>`;
            }).join('');
          })()}
        </div>
      </div>
    </div>

    <div class="cv-right">
      <!-- KPIs -->
      <div class="cv-kpi-row">
        <div class="cv-kpi"><div class="cv-kpi-accent" style="background:#5b21b6;"></div>
          <div class="cv-kpi-lbl">Task ${monthNames[cvMonth]}</div>
          <div class="cv-kpi-val">${totalM}</div>
          <span class="cv-kpi-tag cv-tag-n">Linh hoạt + Cố định</span>
        </div>
        <div class="cv-kpi"><div class="cv-kpi-accent" style="background:#22c55e;"></div>
          <div class="cv-kpi-lbl">Hoàn thành</div>
          <div class="cv-kpi-val">${doneM2}</div>
          <span class="cv-kpi-tag ${doneTag}">${totalM>0?Math.round(doneM2/totalM*100):0}%</span>
        </div>
        <div class="cv-kpi"><div class="cv-kpi-accent" style="background:#ef4444;"></div>
          <div class="cv-kpi-lbl">Quá deadline</div>
          <div class="cv-kpi-val">${overdueM}</div>
          <span class="cv-kpi-tag ${overTag}">${overdueM===0?'On track':'Cần xử lý'}</span>
        </div>
      </div>

      <!-- Bảng LINH HOẠT -->
      <div class="cv-tbl-card">
        <div class="cv-tbl-hdr">
          <div class="cv-tbl-hdr-left"><i class="ti ti-adjustments-horizontal"></i>Task linh hoạt <span class="cv-count">${filtered.length} task${cvRangeStart&&cvRangeEnd?' (theo khoảng)':''}</span></div>
        </div>
        <div class="cv-filter-row">
          <select onchange="cvFilterMang=this.value;renderCongViec()">
            <option value="all">Tất cả mảng</option>
            <option value="Tuyển dụng" ${cvFilterMang==='Tuyển dụng'?'selected':''}>Tuyển dụng</option>
            <option value="C&B" ${cvFilterMang==='C&B'?'selected':''}>C&B</option>
            <option value="Văn hóa nội bộ" ${cvFilterMang==='Văn hóa nội bộ'?'selected':''}>Văn hóa nội bộ</option>
            <option value="Đào tạo" ${cvFilterMang==='Đào tạo'?'selected':''}>Đào tạo</option>
          </select>
          <select onchange="cvFilterUu=this.value;renderCongViec()">
            <option value="all">Tất cả ưu tiên</option>
            <option value="Cao" ${cvFilterUu==='Cao'?'selected':''}>Cao</option>
            <option value="Trung bình" ${cvFilterUu==='Trung bình'?'selected':''}>Trung bình</option>
            <option value="Thấp" ${cvFilterUu==='Thấp'?'selected':''}>Thấp</option>
          </select>
        </div>
        <table class="cv-table">
          <thead><tr>
            <th style="width:42%;">Nội dung</th>
            <th style="width:14%;">Mảng</th>
            <th style="width:13%;">Ưu tiên</th>
            <th style="width:12%;">Deadline</th>
            <th style="width:19%;">Tiến độ</th>
          </tr></thead>
          <tbody>${taskRows}</tbody>
        </table>
      </div>

      <!-- Bảng CỐ ĐỊNH -->
      <div class="cv-tbl-card">
        <div class="cv-tbl-hdr">
          <div class="cv-tbl-hdr-left"><i class="ti ti-pin"></i>Task cố định <span class="cv-count">${rawTaskCD.filter(t=>t['Nội dung chi tiết']).length} task</span></div>
          <span class="cv-tbl-hdr-right">Thực hiện mỗi tháng</span>
        </div>
        ${fixedRows}
      </div>
    </div>
  </div>`;

}

function qtPhaseColor(g){
  if(g==='Tiếp nhận') return {circle:'#dbeafe',border:'#3b82f6',text:'#1d4ed8',line:'#dbeafe',bb:'#dbeafe',bt:'#1d4ed8'};
  if(g==='Gắn kết')  return {circle:'#fdf4ff',border:'#a855f7',text:'#7e22ce',line:'#f3e8ff',bb:'#fdf4ff',bt:'#7e22ce'};
  if(g==='Đào tạo')  return {circle:'#fefce8',border:'#eab308',text:'#a16207',line:'#fef9c3',bb:'#fefce8',bt:'#a16207'};
  if(g==='Cam kết')  return {circle:'#f0fdf4',border:'#22c55e',text:'#15803d',line:'#dcfce7',bb:'#f0fdf4',bt:'#15803d'};
  if(g==='Phê duyệt') return {circle:'#dbeafe',border:'#3b82f6',text:'#1d4ed8',line:'#dbeafe',bb:'#dbeafe',bt:'#1d4ed8'};
  if(g==='Bàn giao')  return {circle:'#fdf4ff',border:'#a855f7',text:'#7e22ce',line:'#f3e8ff',bb:'#fdf4ff',bt:'#7e22ce'};
  if(g==='Thu hồi')   return {circle:'#fff7ed',border:'#f97316',text:'#c2410c',line:'#fed7aa',bb:'#fff7ed',bt:'#c2410c'};
  if(g==='Thanh lý')  return {circle:'#f0fdf4',border:'#22c55e',text:'#15803d',line:'#dcfce7',bb:'#f0fdf4',bt:'#15803d'};
  return {circle:'#f1f5f9',border:'#94a3b8',text:'#64748b',line:'#f1f5f9',bb:'#f1f5f9',bt:'#64748b'};
}

  /* ── OVERVIEW ── */

/* ══════════════════════════════════════════
   CALENDAR — Google Calendar API (OAuth GIS)
══════════════════════════════════════════ */
const CAL_CLIENT_ID='188787944192-9iq8f8gsrc1gctpcf34qbp0sc2itkngf.apps.googleusercontent.com';
const CAL_ID='brian.pham@bigx.vn';
const CAL_SCOPE='https://www.googleapis.com/auth/calendar.readonly';
const CAL_DOW=['Th 2','Th 3','Th 4','Th 5','Th 6','Th 7','CN'];
let calToken=null, calTokenClient=null, calEvents=[], calLoading=false, calErr=null, calRef=new Date();

function calInit(){
  if(calTokenClient) return true;
  if(!(window.google&&google.accounts&&google.accounts.oauth2)) return false;
  calTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CAL_CLIENT_ID, scope:CAL_SCOPE,
    callback:(r)=>{ if(r&&r.access_token){ calToken=r.access_token; calFetch(); } else { calErr='Không lấy được quyền truy cập.'; renderCalendar(); } }
  });
  return true;
}
function calSignIn(){
  if(!calInit()){ calErr='Google Sign-In chưa tải xong, thử lại sau vài giây.'; renderCalendar(); return; }
  calErr=null; calTokenClient.requestAccessToken();
}
async function calFetch(){
  if(!calToken) return;
  calLoading=true; calErr=null; renderCalendar();
  const tMin=new Date(calRef.getFullYear(),calRef.getMonth()-1,1).toISOString();
  const tMax=new Date(calRef.getFullYear(),calRef.getMonth()+2,0,23,59,59).toISOString();
  const url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)
    +'/events?singleEvents=true&orderBy=startTime&maxResults=250'
    +'&timeMin='+encodeURIComponent(tMin)+'&timeMax='+encodeURIComponent(tMax);
  try{
    const res=await fetch(url,{headers:{Authorization:'Bearer '+calToken}});
    if(res.status===401||res.status===403){ calToken=null; throw new Error('Phiên hết hạn, đăng nhập lại.'); }
    if(!res.ok) throw new Error('Lỗi API '+res.status);
    const d=await res.json();
    calEvents=(d.items||[]).map(e=>({
      title:e.summary||'(không tiêu đề)',
      raw:(e.start&&(e.start.dateTime||e.start.date))||null,
      allDay:!!(e.start&&e.start.date&&!e.start.dateTime)
    })).filter(e=>e.raw);
  }catch(err){ calErr=err.message; }
  calLoading=false; renderCalendar();
}
function calDate(ev){
  if(!ev.raw) return null;
  if(ev.allDay){ const p=ev.raw.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
  const d=new Date(ev.raw); return isNaN(d)?null:d;
}
function calTime(ev){
  if(ev.allDay) return 'Cả ngày';
  const d=calDate(ev); if(!d) return '';
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function calCat(t){
  const s=(t||'').toLowerCase();
  if(/train|đào tạo|workshop/.test(s)) return 'cev-b';
  if(/tuyển|phỏng vấn|\bhr\b|onboard|\bcv\b/.test(s)) return 'cev-g';
  if(/thông báo|nghỉ|lương|thanh toán|nhắc/.test(s)) return 'cev-o';
  return 'cev-p';
}
function calChange(delta){ calRef=new Date(calRef.getFullYear(),calRef.getMonth()+delta,1); if(calToken) calFetch(); else renderCalendar(); }
function calSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function calEsc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function renderCalendar(){
  const c=document.getElementById('content');
  if(!calToken && !calLoading){
    c.innerHTML=`<div class="cal-signin">
      <i class="ti ti-calendar-event"></i>
      <div style="font-size:13px">Kết nối Google Calendar (bigx.vn) để xem lịch trên dashboard</div>
      ${calErr?`<div style="font-size:11px;color:#ef4444">${calEsc(calErr)}</div>`:''}
      <button class="cal-btn" onclick="calSignIn()"><i class="ti ti-brand-google"></i>Đăng nhập Google</button>
    </div>`;
    return;
  }
  const today=new Date();
  const first=new Date(calRef.getFullYear(),calRef.getMonth(),1);
  const off=(first.getDay()||7)-1;
  const gridStart=new Date(first); gridStart.setDate(1-off);
  const byDay={};
  calEvents.forEach(ev=>{ const d=calDate(ev); if(!d) return; const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); (byDay[k]=byDay[k]||[]).push(ev); });
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const out=d.getMonth()!==calRef.getMonth();
    const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    const evs=(byDay[k]||[]).sort((a,b)=>calDate(a)-calDate(b));
    let chips='';
    evs.slice(0,2).forEach(ev=>{ const tm=calTime(ev); chips+=`<div class="cal-ev ${calCat(ev.title)}">${tm!=='Cả ngày'?tm+' ':''}${calEsc(ev.title)}</div>`; });
    if(evs.length>2) chips+=`<div class="cal-more">+${evs.length-2} nữa</div>`;
    const dn=calSameDay(d,today)?`<span class="cal-tdy">${d.getDate()}</span>`:d.getDate();
    cells+=`<div class="cal-cell ${out?'out':''}"><div class="cal-dn">${dn}</div>${chips}</div>`;
  }
  const todayMid=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const up=calEvents.map(ev=>({ev,d:calDate(ev)})).filter(x=>x.d&&x.d>=todayMid).sort((a,b)=>a.d-b.d).slice(0,3);
  let ups='';
  up.forEach(x=>{ const d=x.d; const lbl=calSameDay(d,today)?'Hôm nay':String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    ups+=`<div class="cal-uc"><span class="cal-ub">${lbl} · ${calTime(x.ev)}</span><div class="cal-un">${calEsc(x.ev.title)}</div></div>`; });
  if(!ups) ups=`<div class="cal-uc" style="grid-column:1/-1;color:#94a3b8;font-size:11px">Không có sự kiện sắp tới</div>`;
  const status=calLoading?'Đang tải lịch…':(calErr||'Đã kết nối Google Calendar');
  c.innerHTML=`
  <div class="cal-wrap">
    <div class="cal-toolbar">
      <div style="font-size:11px;color:${calErr?'#ef4444':'#94a3b8'}">${calEsc(status)}</div>
      <div style="display:flex;gap:6px">
        <button class="cal-vb" onclick="calFetch()"><i class="ti ti-refresh"></i>Làm mới</button>
        <a class="cal-open" href="https://calendar.google.com/calendar/u/0/r" target="_blank" rel="noopener"><i class="ti ti-external-link"></i>Mở Google Calendar</a>
      </div>
    </div>
    <div class="cal-card">
      <div class="cal-head">
        <span class="cal-nav" onclick="calChange(-1)"><i class="ti ti-chevron-left"></i></span>
        <span class="cal-nav" onclick="calChange(1)"><i class="ti ti-chevron-right"></i></span>
        <span class="cal-mtitle">Tháng ${calRef.getMonth()+1}, ${calRef.getFullYear()}</span>
      </div>
      <div class="cal-dow">${CAL_DOW.map(x=>`<span>${x}</span>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-lg">
        <span class="cal-l"><span class="cal-d" style="background:#5b21b6"></span>Họp / Nội bộ</span>
        <span class="cal-l"><span class="cal-d" style="background:#1d4ed8"></span>Đào tạo</span>
        <span class="cal-l"><span class="cal-d" style="background:#15803d"></span>HR / Tuyển dụng</span>
        <span class="cal-l"><span class="cal-d" style="background:#c2410c"></span>Thông báo</span>
      </div>
    </div>
    <div class="cal-up">${ups}</div>
  </div>`;
}
